name: PowerShell Security Scan & Deploy

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ps-security:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./ -Recurse -Severity Error, Warning
          if ($results) {
              $results | Format-Table -AutoSize
              Write-Error "PSScriptAnalyzer found issues. Failing build."
              exit 1
          }

  deploy:
    needs: ps-security
    # Only run if commit message contains the release trigger
    if: success() && github.event_name == 'push' && contains(github.event.head_commit.message, 'release to psgallery')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version from Commit Message
        shell: pwsh
        run: |
          $msg = "${{ github.event.head_commit.message }}"
          # Regex to find 'v' followed by numbers/dots (e.g., v1.0.2)
          if ($msg -match '(v\d+\.\d+\.\d+)') {
              $version = $Matches[1]
              Write-Host "Detected version: $version"
              # Save it to the GitHub Environment for later steps
              "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
              "RELEASE_VERSION=v$(date +'%Y.%m.%d')" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Flatten and Push to Production Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Create a temporary orphan branch
          git checkout --orphan temp-production
          
          # 2. Extract module from the Windows folder to the root
          cp -r Windows/Clip-Tree .
          
          # 3. Cleanup: Remove dev folders and keep only what's needed for the Gallery
          rm -rf Windows .github .gitignore
          
          # 4. Commit using the extracted version from the previous step
          git add .
          git commit -m "Production release: ${{ env.RELEASE_VERSION }} [skip ci]"
          git push origin temp-production:production-psgallery --force

      - name: Publish to PowerShell Gallery
        shell: pwsh
        run: |
          Publish-Module -Path ./Clip-Tree -NuGetApiKey ${{ secrets.PSGALLERY_API_KEY }} -Verbose