name: PowerShell Security Scan & Deploy

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ps-security:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./ -Recurse -Severity Error, Warning
          if ($results) {
              $results | Format-Table -AutoSize
              Write-Error "PSScriptAnalyzer found issues. Failing build."
              exit 1
          }

      - name: Update Badge Timestamp
        if: success() && github.event_name == 'push'
        shell: pwsh
        run: |
          $timestamp = Get-Date -UFormat %s
          if (Test-Path "README.md") {
              (Get-Content "README.md" -Raw) -replace 'badge\.svg\?t=\d*', "badge.svg?t=$timestamp" | Set-Content "README.md" -NoNewline
          }

      - name: Commit Badge Changes
        if: success() && github.event_name == 'push'
        shell: pwsh
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if (git status --porcelain) {
              git add README.md
              git commit -m "chore: update badge timestamp [skip ci]"
              git push
          }

  deploy:
    needs: ps-security
    if: success() && github.event_name == 'push' && contains(github.event.head_commit.message, 'release to psgallery')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Flatten and Push to Production Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Create a temporary orphan branch
          git checkout --orphan temp-production
          
          # 2. Keep README and LICENSE at the root for GitHub display
          # 3. Keep the Clip-Tree folder for PowerShell compatibility
          # We move the folder out of "Windows/"
          cp -r Windows/Clip-Tree .
          
          # 4. Remove the original dev folders
          rm -rf Windows .github
          
          # 5. Commit and Force Push
          git add .
          git commit -m "Production release: $(date +'%Y-%m-%d') [skip ci]"
          git push origin temp-production:production-psgallery --force

      - name: Publish to PowerShell Gallery
        shell: pwsh
        run: |
          # We point specifically to the folder containing the .psd1
          Publish-Module -Path ./Clip-Tree -NuGetApiKey ${{ secrets.PSGALLERY_API_KEY }} -Verbose